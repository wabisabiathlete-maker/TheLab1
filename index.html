const LOWER_DAYS = ["PUSH A","PUSH B"];
function getRestInfo(sn, dl) {
  const key = Object.keys(REST_CONFIG).find(k=>sn.startsWith(k)||sn.includes(k)) || "C2";
  const cfg = REST_CONFIG[key] || REST_CONFIG["C2"];
  const isL = LOWER_DAYS.includes(dl) && (sn==="A SERIES"||sn==="BARBELL WORK");
  return {secs:isL?cfg.lower:cfg.upper, label:isL?cfg.label_l:cfg.label_u, cardiac:cfg.cardiac};
}

// ─── DROP SET ENGINE ──────────────────────────────────────────────────────────
// Detects pattern and assigns drops intelligently per set
function makeDrops(repsScheme, phase, isFinisher=false) {
  const nums = repsScheme.map(r=>parseInt(r)||0).filter(n=>n>0);
  const isDescending = nums.length>=3 && nums[nums.length-1]<nums[0] && nums[0]>=8;
  const isWave = repsScheme.includes("6")&&repsScheme.includes("8");

  return repsScheme.map((rep,i)=>{
    const n = parseInt(rep)||0;
    const isLast = i===repsScheme.length-1;
    const isHeavy = n<=6 && n>=3;
    const isVol = n===8;

    // Finisher descending: double drop on final set only
    if(isFinisher||isDescending){
      if(isLast) return {drops:2, repTarget:"10-12 → 15+", pct:25};
      return null;
    }
    // Wave loading A series
    if(isWave){
      if(phase===1) return isLast?{drops:1,repTarget:"10-12",pct:20}:null;
      if(phase===2){
        if(isHeavy&&isLast) return {drops:2,repTarget:"10-12 → 15",pct:20};
        if(isHeavy) return {drops:1,repTarget:"10-12",pct:20};
        if(isVol&&isLast) return {drops:1,repTarget:"10",pct:15};
        return null;
      }
      if(phase===3){
        if(isHeavy) return {drops:2,repTarget:"10-12 → 15",pct:20};
        if(isVol) return {drops:1,repTarget:"10-12",pct:15};
        return null;
      }
      if(phase===4){
        if(isHeavy) return {drops:2,repTarget:"8-10 → 12-15",pct:20};
        if(isVol) return {drops:1,repTarget:"10-12",pct:15};
        return null;
      }
    }
    // Barbell heavy (5/3/3/3 etc)
    if(n<=5&&n>=1){
      if(phase>=3&&isLast) return {drops:2,repTarget:"8-10 → 12",pct:20};
      return null;
    }
    return null;
  });
}

function useBeep(){
  const ctx=useRef(null);
  const gc=()=>{if(!ctx.current)try{ctx.current=new(window.AudioContext||window.webkitAudioContext)();}catch{}return ctx.current;};
  const beep=useCallback((f=880,d=0.12,v=0.4)=>{try{const c=gc();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type="sine";g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.start(c.currentTime);o.stop(c.currentTime+d);}catch{}},[]);
  const chime=useCallback(()=>{beep(660,0.1,0.3);setTimeout(()=>beep(880,0.1,0.35),140);setTimeout(()=>beep(1100,0.2,0.5),280);},[beep]);
  return{beep,chime};
}

// ─── STORAGE ──────────────────────────────────────────────────────────────────
const LS="jackedlete_v5";
function load(){try{const r=localStorage.getItem(LS);return r?JSON.parse(r):{phase:2,logs:{},done:{}};}catch{return{phase:2,logs:{},done:{}};}}
function save(s){try{localStorage.setItem(LS,JSON.stringify(s));}catch{}}
function wk(){const d=new Date(),j=new Date(d.getFullYear(),0,1);return`${d.getFullYear()}-W${Math.ceil(((d-j)/86400000+j.getDay()+1)/7)}`;}
function fd(){return new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function ft(s){return`${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}`;}

// ─── DROP SET ENGINE ──────────────────────────────────────────────────────────
function makeDrops(repsScheme, phase, isFinisher=false){
  const nums=repsScheme.map(r=>parseInt(r)||0).filter(n=>n>0);
  const isDescending=nums.length>=3&&nums[nums.length-1]<nums[0]&&nums[0]>=8;
  const isWave=repsScheme.includes("6")&&repsScheme.includes("8");
  return repsScheme.map((rep,i)=>{
    const n=parseInt(rep)||0;
    const isLast=i===repsScheme.length-1;
    const isHeavy=n<=6&&n>=3;
    const isVol=n===8;
    if(isFinisher||isDescending){
      return isLast?{drops:2,repTarget:"10-12 → 15+",pct:25}:null;
    }
    if(isWave){
      if(phase===1)return isLast?{drops:1,repTarget:"10-12",pct:20}:null;
      if(phase===2){
        if(isHeavy&&isLast)return{drops:2,repTarget:"10-12 → 15",pct:20};
        if(isHeavy)return{drops:1,repTarget:"10-12",pct:20};
        if(isVol&&isLast)return{drops:1,repTarget:"10",pct:15};
        return null;
      }
      if(phase===3){
        if(isHeavy)return{drops:2,repTarget:"10-12 → 15",pct:20};
        if(isVol)return{drops:1,repTarget:"10-12",pct:15};
        return null;
      }
      if(phase===4){
        if(isHeavy)return{drops:2,repTarget:"8-10 → 12-15",pct:20};
        if(isVol)return{drops:1,repTarget:"10-12",pct:15};
        return null;
      }
    }
    if(n<=5&&n>=1){
      if(phase>=3)return{drops:2,repTarget:"8-10 → 12",pct:20};
      return null;
    }
    return null;
  });
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const [store,setStore]=useState(load);
  const [activeDay,setActiveDay]=useState(0);
  const [view,setView]=useState("workout");
  const [timer,setTimer]=useState(null);
  const [toast,setToast]=useState(null);
  const [showAdvance,setShowAdvance]=useState(false);
  const tickRef=useRef(null);
  const weekKey=wk();
  const {beep,chime}=useBeep();

  useEffect(()=>{save(store);},[store]);
  useEffect(()=>{
    if(!timer?.active||timer.remaining<=0)return;
    tickRef.current=setTimeout(()=>{
      const n=timer.remaining-1;
      if([10,5,3,2,1].includes(n))beep(n<=3?880:660,0.08,0.25);
      if(n===0)chime();
      setTimer(t=>t?{...t,remaining:n,active:n>0}:t);
    },1000);
    return()=>clearTimeout(tickRef.current);
  },[timer,beep,chime]);

  const startTimer=useCallback((secs,label,cardiac,color)=>{
    if(!secs)return;
    clearTimeout(tickRef.current);
    beep(440,0.08,0.25);
    setTimer({total:secs,remaining:secs,label,cardiac,color,active:true});
  },[beep]);

  const dismissTimer=()=>{clearTimeout(tickRef.current);setTimer(null);};
  const adjTimer=d=>setTimer(t=>t?{...t,remaining:Math.max(0,t.remaining+d),total:Math.max(0,t.total+d)}:t);
  const pauseTimer=()=>setTimer(t=>t?{...t,active:!t.active}:t);
  const addTimer=s=>setTimer(t=>t?{...t,remaining:t.remaining+s,total:t.total+s,active:true}:t);
  const showToast=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),2400);};

  const phase=store.phase;
  const phaseData=PHASES[phase-1];
  const program=PROGRAMS[phase]||PROGRAMS[2];
  const currentDay=program[activeDay];

  const logSet=(exId,si,w,r)=>{
    const k=`${weekKey}_${phase}_${activeDay}_${exId}_${si}`;
    setStore(p=>({...p,logs:{...p.logs,[k]:{weight:w,reps:r,date:fd()}}}));
  };
  const getLog=(exId,si)=>store.logs[`${weekKey}_${phase}_${activeDay}_${exId}_${si}`]||null;
  const isDone=(exId,si)=>!!store.done[`${phase}_${activeDay}_${exId}_${si}`];
  const toggleDone=(exId,si)=>setStore(p=>({...p,done:{...p.done,[`${phase}_${activeDay}_${exId}_${si}`]:!p.done[`${phase}_${activeDay}_${exId}_${si}`]}}));

  const progress=(()=>{
    let t=0,d=0;
    program[activeDay].series.forEach(s=>s.exercises.forEach(ex=>{
      for(let i=0;i<ex.sets;i++){t++;if(isDone(ex.id,i))d++;}
    }));
    return t?Math.round((d/t)*100):0;
  })();

  const advancePhase=()=>{
    if(phase<4){setStore(p=>({...p,phase:p.phase+1}));setShowAdvance(false);setActiveDay(0);showToast(`Advanced to Phase ${phase+1}!`);}
  };

  return(
    <div style={{minHeight:"100vh",background:"#0A0A0A",fontFamily:"'Barlow Condensed','Arial Narrow',sans-serif",color:"#E8E8E8",userSelect:"none"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#2A2A2A;border-radius:2px}
        input[type=number]{-moz-appearance:textfield;background:#181818;border:1px solid #2C2C2C;color:#DDD;border-radius:6px;padding:5px 6px;font-family:'Barlow',sans-serif;font-size:13px;width:100%;outline:none;transition:border-color .15s;text-align:center;}
        input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
        input[type=number]:focus{border-color:#C9A84C}
        .hov{transition:all .12s;cursor:pointer}.hov:hover{filter:brightness(1.2);transform:scale(1.03)}
        .rh:hover{background:rgba(255,255,255,0.015)}
        @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes ts{from{opacity:0;transform:translateY(16px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes tw{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
        @keyframes cp{0%,100%{opacity:1}50%{opacity:.4}}
        .fb{animation:fu .28s ease forwards}
        .twrap{animation:tw .22s cubic-bezier(.34,1.4,.64,1) forwards}
      `}</style>

      {toast&&<div style={{position:"fixed",bottom:96,left:"50%",transform:"translateX(-50%)",background:toast.type==="ok"?"#182818":"#281818",border:`1px solid ${toast.type==="ok"?"#4A8A4A":"#8A3A3A"}`,color:toast.type==="ok"?"#7ED881":"#E87B6E",padding:"9px 18px",borderRadius:8,fontSize:12,fontFamily:"Barlow,sans-serif",fontWeight:600,zIndex:9999,animation:"ts .18s ease",boxShadow:"0 4px 20px rgba(0,0,0,.7)",whiteSpace:"nowrap"}}>{toast.msg}</div>}
      {timer&&<RestTimer timer={timer} onDismiss={dismissTimer} onAdjust={adjTimer} onPause={pauseTimer} onAdd={addTimer}/>}
      {showAdvance&&<AdvanceModal phase={phase} phases={PHASES} onConfirm={advancePhase} onCancel={()=>setShowAdvance(false)}/>}

      <div style={{background:"#0D0D0D",borderBottom:`2px solid ${phaseData.color}`,padding:"0 14px",position:"sticky",top:0,zIndex:200}}>
        <div style={{maxWidth:680,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:52}}>
          <div style={{display:"flex",alignItems:"baseline",gap:8}}>
            <span style={{fontSize:22,fontWeight:900,color:phaseData.color,letterSpacing:".12em"}}>JACKEDLETE</span>
            <div style={{background:phaseData.color,color:"#000",fontSize:8,fontWeight:800,borderRadius:4,padding:"2px 6px",letterSpacing:".1em"}}>PHASE {phase}</div>
          </div>
          <div style={{display:"flex",gap:5}}>
            {["workout","phases","history"].map(v=>(
              <button key={v} onClick={()=>setView(v)} style={{background:view===v?phaseData.color:"transparent",color:view===v?"#000":"#666",border:`1px solid ${view===v?phaseData.color:"#2A2A2A"}`,borderRadius:6,padding:"4px 9px",fontSize:9,fontWeight:700,letterSpacing:".1em",cursor:"pointer",textTransform:"uppercase",transition:"all .12s"}}>{v}</button>
            ))}
          </div>
        </div>
      </div>

      {view==="workout"&&<WorkoutView program={program} activeDay={activeDay} setActiveDay={setActiveDay} currentDay={currentDay} progress={progress} phaseData={phaseData} logSet={logSet} getLog={getLog} isDone={isDone} toggleDone={toggleDone} showToast={showToast} startTimer={startTimer} phase={phase} onSuggestAdvance={()=>setShowAdvance(true)}/>}
      {view==="phases"&&<PhasesView phases={PHASES} currentPhase={phase} onAdvance={()=>setShowAdvance(true)}/>}
      {view==="history"&&<HistoryView store={store} weekKey={weekKey} phase={phase}/>}
    </div>
  );
}

    <div style={{position:"relative",width:50,height:50,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <svg width={50} height={50} style={{position:"absolute",transform:"rotate(-90deg)"}}>

        <circle cx={25} cy={25} r={r} fill="none" stroke={color} strokeWidth={3} strokeDasharray={C} strokeDashoffset={C-(C*progress/100)} strokeLinecap="round" style={{transition:"stroke-dashoffset .4s ease"}}/>
      </svg>
      <span style={{fontSize:11,fontWeight:800,color,zIndex:1}}>{progress}%</span>
    </div>
  );

  const n=series.name;
  const sc=n.startsWith("A ")||n.startsWith("BARBELL")||n.startsWith("RUN")?"#C9A84C":
           n.startsWith("B ")?"#7EB8D4":
           n.includes("C1")||n.includes("CHEST")||n.includes("QUAD")||n.includes("ARM")||n.includes("ATHLETIC FIN")?"#A8D4A0":
           n.includes("C2")||n.includes("TRICEP")||n.includes("BICEP")||n.includes("BACK FIN")||n.includes("COND")?"#D4A8C8":
           n.startsWith("ZONE")||n.startsWith("MOVE")||n.startsWith("FINISH")?"#888":"#888";
  const rest=getRestInfo(series.name,dayLabel);
  const isAorBarbell=n==="A SERIES"||n==="BARBELL WORK";
  const isFinisher=n.includes("C1")||n.includes("C2")||n.includes("CHEST")||n.includes("QUAD")||n.includes("TRICEP")||n.includes("BICEP")||n.includes("BACK FIN")||n.includes("ARM")||n.includes("COND");

  return(

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:"#141414",borderBottom:open?"1px solid #1A1A1A":"none"}}>
        <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:8,flex:1,cursor:"pointer"}}>
          <div style={{width:3,height:14,background:sc,borderRadius:2,flexShrink:0}}/>
          <span style={{fontSize:10,fontWeight:800,color:sc,letterSpacing:".12em"}}>{series.name}</span>
          {series.type==="superset"&&<span style={{fontSize:7,fontWeight:700,color:"#000",background:sc,borderRadius:3,padding:"1px 4px",letterSpacing:".06em"}}>SUPERSET</span>}
          {isFinisher&&<span style={{fontSize:7,fontWeight:700,color:"#000",background:"#E87B6E",borderRadius:3,padding:"1px 4px",letterSpacing:".06em"}}>↓ DROPS</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          {rest.secs>0&&<button className="hov" onClick={()=>startTimer(rest.secs,`${series.name} — ${rest.label}`,rest.cardiac,sc)} style={{display:"flex",alignItems:"center",gap:4,background:"#1A1A1A",border:`1px solid ${sc}33`,borderRadius:6,padding:"3px 8px",color:sc,fontSize:9,fontWeight:800,cursor:"pointer"}}>⏱ {rest.label}</button>}
          <span onClick={()=>setOpen(o=>!o)} style={{color:"#333",fontSize:12,cursor:"pointer"}}>{open?"▲":"▼"}</span>
        </div>
      </div>
      {open&&series.exercises.map((ex,ei)=>(
        <ExBlock key={ex.id} ex={ex} isLast={ei===series.exercises.length-1} sc={sc} rest={rest} logSet={logSet} getLog={getLog} isDone={isDone} toggleDone={toggleDone} showToast={showToast} startTimer={startTimer} phase={phase} isDropEligible={isAorBarbell||isFinisher}/>
      ))}
    </div>
  );
}

// ─── EXERCISE BLOCK ───────────────────────────────────────────────────────────
function ExBlock({ex,isLast,sc,rest,logSet,getLog,isDone,toggleDone,showToast,startTimer,phase,isDropEligible}){
  const isFinisherScheme = (() => {
    const nums=ex.repsScheme.map(r=>parseInt(r)||0).filter(n=>n>0);
    return nums.length>=3&&nums[nums.length-1]<nums[0]&&nums[0]>=8;
  })();
  const dropCfg=isDropEligible?makeDrops(ex.repsScheme,phase,isFinisherScheme):ex.repsScheme.map(()=>null);
  const hasAnyDrop=dropCfg.some(Boolean);
  return(
    <div style={{borderBottom:isLast?"none":"1px solid #181818"}}>
      <div style={{padding:"8px 12px 4px"}}>
        <div style={{fontSize:13,fontWeight:700,color:"#E8E8E8",marginBottom:3}}>{ex.name}</div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",marginBottom:3}}>
          {ex.tempo!=="—"&&<Pill label="TEMPO" val={ex.tempo} color="#C9A84C"/>}
          <Pill label="SETS" val={ex.sets} color={sc}/>
          {rest.secs>0&&<Pill label="REST" val={rest.label} color="#444"/>}
          {hasAnyDrop&&<Pill label="DROP SETS" val="↓" color="#E87B6E"/>}
        </div>
        <div style={{fontSize:10,color:"#4A4A4A",fontFamily:"Barlow,sans-serif",fontStyle:"italic",lineHeight:1.5}}>{ex.cue}</div>
      </div>
      <div style={{padding:"0 12px 8px"}}>
        <div style={{display:"grid",gridTemplateColumns:"20px 46px 1fr 1fr 28px 28px",gap:4,padding:"2px 0",borderBottom:"1px solid #1A1A1A",marginBottom:2}}>
          {["#","TARGET","WEIGHT","REPS","⏱","✓"].map(h=>(
            <span key={h} style={{fontSize:7,color:"#2A2A2A",fontWeight:700,letterSpacing:".08em",textAlign:["WEIGHT","REPS"].includes(h)?"center":"left"}}>{h}</span>
          ))}
        </div>
        {Array.from({length:ex.sets}).map((_,si)=>(
          <React.Fragment key={si}>
            <SetRow setNum={si+1} target={ex.repsScheme[si]||ex.repsScheme[ex.repsScheme.length-1]} exId={ex.id} setIdx={si} sc={sc} rest={rest} logSet={logSet} getLog={getLog} isDone={isDone} toggleDone={toggleDone} showToast={showToast} startTimer={startTimer} hasDrops={!!dropCfg[si]}/>
            {dropCfg[si]&&isDone(ex.id,si)&&(
              <DropSetRows cfg={dropCfg[si]} exId={ex.id} setIdx={si} logSet={logSet} getLog={getLog} isDone={isDone} toggleDone={toggleDone} showToast={showToast} sc={sc} workingWeight={getLog(ex.id,si)?.weight||""}/>
            )}
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

// ─── DROP SET ROWS ────────────────────────────────────────────────────────────
function DropSetRows({cfg,exId,setIdx,logSet,getLog,isDone,toggleDone,showToast,sc,workingWeight}){
  const drops=cfg.drops||1;
  const repParts=cfg.repTarget?cfg.repTarget.split("→").map(s=>s.trim()):[];
  const pct=cfg.pct||20;
  const sw=parseFloat(workingWeight);
  const suggested=Array.from({length:drops},(_,i)=>{
    if(!sw)return"";
    return Math.round(sw*(1-(pct/100)*(i+1))/2.5)*2.5;
  });
  return(
    <div style={{background:"rgba(232,123,110,.04)",borderLeft:"2px solid rgba(232,123,110,.25)",marginLeft:6,marginBottom:4,borderRadius:"0 6px 6px 0",paddingTop:2}}>
      <div style={{display:"flex",alignItems:"center",gap:5,padding:"3px 8px 1px"}}>
        <span style={{fontSize:8,color:"#E87B6E",fontWeight:800,letterSpacing:".15em"}}>DROP {drops>1?"SETS":"SET"}</span>
        <span style={{fontSize:8,color:"#5A2A2A",fontFamily:"Barlow,sans-serif"}}>↓{pct}% · {cfg.repTarget} · failure</span>
      </div>
      {Array.from({length:drops}).map((_,di)=>{
        const dk=`drop_${exId}_${setIdx}_${di}`;
        const ex=getLog(dk,0);
        const [dw,setDw]=useState(ex?.weight||suggested[di]||"");
        const [dr,setDr]=useState(ex?.reps||"");
        const done=isDone(dk,0);
        const hint=repParts[di]||repParts[repParts.length-1]||"failure";
        return(
          <div key={di} className="rh" style={{display:"grid",gridTemplateColumns:"20px 46px 1fr 1fr 28px 28px",gap:4,alignItems:"center",padding:"3px 8px",opacity:done?.35:1}}>
            <div style={{width:16,height:16,borderRadius:3,background:done?"#E87B6E":"#1A1010",border:`1px solid ${done?"#E87B6E":"#3A2020"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:800,color:done?"#000":"#5A2A2A"}}>D{di+1}</div>
            <div style={{fontSize:9,fontWeight:700,color:"#E87B6E"}}>{hint}</div>
            <input type="number" placeholder={suggested[di]?`~${suggested[di]}`:"lbs"} value={dw} onChange={e=>setDw(e.target.value)} min={0} step={2.5} disabled={done} style={{opacity:done?.15:1,fontSize:11,padding:"3px 4px",borderColor:"#3A2020"}}/>
            <input type="number" placeholder="reps" value={dr} onChange={e=>setDr(e.target.value)} min={0} disabled={done} style={{opacity:done?.15:1,fontSize:11,padding:"3px 4px",borderColor:"#3A2020"}}/>
            <div/>
            <button className="hov" onClick={()=>{logSet(dk,0,dw,dr);toggleDone(dk,0);if(!done)showToast(`D${di+1} logged ✓`);}} style={{width:24,height:24,borderRadius:4,background:done?"#E87B6E":"#1A1010",border:`1px solid ${done?"#E87B6E":"#3A2020"}`,color:done?"#000":"#5A2A2A",fontSize:done?9:11,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all .15s"}}>{done?"✓":"○"}</button>
          </div>
        );
      })}
    </div>
  );
}

// ─── SET ROW ──────────────────────────────────────────────────────────────────
function SetRow({setNum,target,exId,setIdx,sc,rest,logSet,getLog,isDone,toggleDone,showToast,startTimer,hasDrops}){
  const ex=getLog(exId,setIdx);
  const [w,setW]=useState(ex?.weight||"");
  const [r,setR]=useState(ex?.reps||"");
  const done=isDone(exId,setIdx);
  const noInputOk=["—","30–35 min","40–45 min","35–40 min","40m","10 min","12 min","20 min","15–20 min","60s","30s","20s","25s","35s","40s"].some(v=>target.includes(v.replace(/–.*/,"")));
  const complete=()=>{
    if(!w&&!r&&!noInputOk){showToast("Enter weight or reps first","err");return;}
    logSet(exId,setIdx,w,r);
    toggleDone(exId,setIdx);
    if(!done){
      showToast(hasDrops?`Set ${setNum} ✓ — drop set unlocked ↓`:`Set ${setNum} logged ✓`);
      if(rest.secs>0)startTimer(rest.secs,`REST — ${rest.label}`,rest.cardiac,sc);
    }
  };
  return(
    <div className="rh" style={{display:"grid",gridTemplateColumns:"20px 46px 1fr 1fr 28px 28px",gap:4,alignItems:"center",padding:"3px 0",opacity:done&&!hasDrops?.35:1,transition:"opacity .2s"}}>
      <div style={{width:17,height:17,borderRadius:4,background:done?sc:"#1A1A1A",border:`1px solid ${done?sc:"#252525"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7.5,fontWeight:800,color:done?"#000":"#333",transition:"all .2s"}}>{setNum}</div>
      <div style={{display:"flex",alignItems:"center",gap:2}}>
        <span style={{fontSize:10,fontWeight:800,color:"#C9A84C"}}>{target}</span>
        {hasDrops&&<span style={{fontSize:9,color:"#E87B6E",fontWeight:800,lineHeight:1}}>↓</span>}
      </div>
      <input type="number" placeholder="lbs" value={w} onChange={e=>setW(e.target.value)} min={0} step={2.5} disabled={done} style={{opacity:done?.15:1,fontSize:11,padding:"3px 4px"}}/>
      <input type="number" placeholder="reps" value={r} onChange={e=>setR(e.target.value)} min={0} disabled={done} style={{opacity:done?.15:1,fontSize:11,padding:"3px 4px"}}/>
      <button className="hov" onClick={()=>rest.secs>0&&startTimer(rest.secs,`REST — ${rest.label}`,rest.cardiac,sc)} style={{width:24,height:24,borderRadius:4,background:"#141414",border:"1px solid #1E1E1E",color:rest.secs>0?sc:"#222",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",opacity:rest.secs>0?1:.25}}>⏱</button>
      <button className="hov" onClick={complete} style={{width:24,height:24,borderRadius:4,background:done?sc:"#141414",border:`1px solid ${done?sc:"#1E1E1E"}`,color:done?"#000":"#333",fontSize:done?9:12,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all .15s"}}>{done?"✓":"○"}</button>
    </div>
  );
}

function Pill({label,val,color}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:3,background:"#181818",border:"1px solid #1E1E1E",borderRadius:4,padding:"1px 5px"}}>
      <span style={{fontSize:7,color:"#333",fontWeight:700,letterSpacing:".1em"}}>{label}</span>
      <span style={{fontSize:9,color,fontWeight:800}}>{val}</span>
    </div>
  );
}

// ─── REST TIMER ───────────────────────────────────────────────────────────────
function RestTimer({timer,onDismiss,onAdjust,onPause,onAdd}){
  const pct=timer.total>0?timer.remaining/timer.total:0;
  const done=timer.remaining===0;
  const low=!done&&timer.remaining<=10;
  const arc=done?"#58A45C":low?"#E87B6E":(timer.color||"#C9A84C");
  const R=52,C=2*Math.PI*R;
  return(
    <div className="twrap" style={{position:"fixed",bottom:0,left:0,right:0,zIndex:300,background:done?"#0C1A0C":"#0D0D0D",borderTop:`2px solid ${arc}`,boxShadow:"0 -6px 32px rgba(0,0,0,.85)",padding:"14px 14px 28px",transition:"background .5s"}}>
      <div style={{maxWidth:540,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:10}}>
          <div>
            <div style={{fontSize:8,color:"#444",fontWeight:700,letterSpacing:".18em",marginBottom:1}}>REST TIMER</div>
            <div style={{fontSize:12,fontWeight:800,color:arc,letterSpacing:".06em"}}>{timer.label}</div>
          </div>
          <button className="hov" onClick={onDismiss} style={{background:"#181818",border:"1px solid #2A2A2A",color:"#444",borderRadius:7,width:28,height:28,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>✕</button>
        </div>
        <div style={{display:"flex",gap:14,alignItems:"center"}}>
          <div style={{position:"relative",width:118,height:118,flexShrink:0}}>
            <svg width={118} height={118} style={{transform:"rotate(-90deg)"}}>
              <circle cx={59} cy={59} r={R} fill="none" stroke="#1C1C1C" strokeWidth={8}/>
              <circle cx={59} cy={59} r={R} fill="none" stroke={arc} strokeWidth={8} strokeDasharray={`${C*pct} ${C}`} strokeLinecap="round" style={{transition:"stroke-dasharray 0.95s linear,stroke .3s"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
              <div style={{fontSize:done?22:34,fontWeight:900,color:done?"#58A45C":low?"#E87B6E":"#EEE",lineHeight:1,animation:low&&!done?"cp .7s infinite":"none"}}>{done?"GO!":ft(timer.remaining)}</div>
              {!done&&<div style={{fontSize:7.5,color:"#333",marginTop:1,fontWeight:700}}>/ {ft(timer.total)}</div>}
            </div>
          </div>
          <div style={{flex:1,display:"flex",flexDirection:"column",gap:6}}>
            {timer.cardiac&&<div style={{background:"rgba(232,123,110,.07)",border:"1px solid rgba(232,123,110,.2)",borderRadius:7,padding:"5px 8px"}}><div style={{fontSize:7.5,color:"#E87B6E",fontWeight:700,letterSpacing:".1em",marginBottom:1}}>❤️ CARDIAC</div><div style={{fontSize:9,color:"#C07060",fontFamily:"Barlow,sans-serif",lineHeight:1.4}}>{timer.cardiac}</div></div>}
            <div style={{display:"flex",gap:4}}>
              {[-30,-15,+15,+30].map(d=>(
                <button key={d} className="hov" onClick={()=>onAdjust(d)} style={{flex:1,height:30,borderRadius:6,cursor:"pointer",background:"#181818",border:"1px solid #252525",color:d<0?"#E87B6E":"#7EB8D4",fontSize:10,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{d>0?"+":""}{d}s</button>
              ))}
            </div>
            <div style={{display:"flex",gap:5}}>
              <button className="hov" onClick={onPause} style={{flex:1,height:35,borderRadius:8,cursor:"pointer",background:timer.active?"#181818":"#182818",border:`1px solid ${timer.active?"#2A2A2A":"#3A5A3A"}`,color:timer.active?"#666":"#58A45C",fontSize:10,fontWeight:800,letterSpacing:".08em",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>{timer.active?"⏸ PAUSE":"▶ RESUME"}</button>
              <button className="hov" onClick={onDismiss} style={{flex:1,height:35,borderRadius:8,cursor:"pointer",background:done?"#182818":"#181818",border:`1px solid ${done?"#4A8A4A":"#2A2A2A"}`,color:done?"#58A45C":"#555",fontSize:10,fontWeight:800,letterSpacing:".08em",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>{done?"✓ NEXT SET":"⏭ SKIP"}</button>
            </div>
            {!done&&<div style={{display:"flex",gap:4,alignItems:"center"}}><span style={{fontSize:7.5,color:"#2A2A2A",fontWeight:700}}>ADD:</span>{[30,60].map(s=><button key={s} className="hov" onClick={()=>onAdd(s)} style={{height:22,padding:"0 7px",borderRadius:4,cursor:"pointer",background:"#141414",border:"1px solid #1E1E1E",color:"#666",fontSize:9,fontWeight:700,display:"flex",alignItems:"center"}}>+{s}s</button>)}<span style={{fontSize:7.5,color:"#222"}}>if HR still high</span></div>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── HISTORY VIEW ─────────────────────────────────────────────────────────────
function HistoryView({store,weekKey,phase}){
  const byDay={};
  const exMap={};
  Object.values(PROGRAMS).forEach(prog=>prog.forEach(d=>d.series.forEach(s=>s.exercises.forEach(ex=>{exMap[ex.id]=ex.name;}))));
  Object.entries(store.logs).filter(([k])=>k.startsWith(weekKey)).forEach(([k,v])=>{
    const p=k.split("_");if(p.length<6)return;
    const ph=parseInt(p[1]),di=parseInt(p[2]),ei=p[3],si=parseInt(p[4]);
    const key=`ph${ph}_d${di}`;
    if(!byDay[key])byDay[key]={phase:ph,day:di,exercises:{}};
    if(!byDay[key].exercises[ei])byDay[key].exercises[ei]=[];
    byDay[key].exercises[ei].push({si,...v});
  });
  return(
    <div style={{maxWidth:680,margin:"0 auto",padding:"14px 14px 80px"}}>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:20,fontWeight:900,color:"#EEE",letterSpacing:".1em"}}>THIS WEEK'S LOG</div>
        <div style={{fontSize:10,color:"#444",fontFamily:"Barlow,sans-serif",marginTop:2}}>Week {weekKey} · Saved to device · Resets each new week</div>
      </div>
      {Object.keys(byDay).length===0&&(
        <div style={{background:"#0F0F0F",border:"1px solid #1E1E1E",borderRadius:12,padding:36,textAlign:"center"}}>
          <div style={{fontSize:32,marginBottom:10}}>📋</div>
          <div style={{fontSize:13,color:"#444",fontFamily:"Barlow,sans-serif"}}>Nothing logged yet this week.</div>
        </div>
      )}
      {Object.entries(byDay).map(([key,{phase:ph,day:di,exercises}])=>{
        const phData=PHASES[ph-1];
        const prog=PROGRAMS[ph]||PROGRAMS[2];
        const dayData=prog[di];
        if(!dayData||!phData)return null;
        return(
          <div key={key} style={{background:"#0F0F0F",border:"1px solid #1E1E1E",borderLeft:`4px solid ${phData.color}`,borderRadius:12,marginBottom:10,overflow:"hidden"}}>
            <div style={{background:"#141414",padding:"8px 12px",borderBottom:"1px solid #1A1A1A",display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:8,background:phData.color,color:"#000",fontWeight:800,borderRadius:3,padding:"1px 5px"}}>P{ph}</span>
              <span style={{fontSize:13,fontWeight:900,color:phData.color}}>DAY {dayData.day}</span>
              <span style={{fontSize:10,fontWeight:700,color:"#444"}}>{dayData.label} — {dayData.sub}</span>
            </div>
            {Object.entries(exercises).map(([eid,sets])=>(
              <div key={eid} style={{padding:"8px 12px",borderBottom:"1px solid #161616"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#AAA",marginBottom:5}}>{exMap[eid]||eid}</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {sets.sort((a,b)=>a.si-b.si).map((s,i)=>(
                    <div key={i} style={{background:"#181818",border:"1px solid #222",borderRadius:6,padding:"4px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:1,minWidth:46}}>
                      <span style={{fontSize:7,color:"#333",fontWeight:700}}>{s.si===0?"SET 1":`S${s.si+1}`}</span>
                      {s.weight&&<span style={{fontSize:12,fontWeight:800,color:"#C9A84C"}}>{s.weight}<span style={{fontSize:6.5,color:"#444"}}>lb</span></span>}
                      {s.reps&&<span style={{fontSize:10,fontWeight:700,color:"#7EB8D4"}}>{s.reps}<span style={{fontSize:6.5,color:"#444"}}>reps</span></span>}
                      {!s.weight&&!s.reps&&<span style={{fontSize:9,color:"#2A2A2A"}}>✓</span>}
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
